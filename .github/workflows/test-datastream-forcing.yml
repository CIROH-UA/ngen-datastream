name: Test Datastream Forcing

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/terraform/services/nrds/datastreams/forcing/**'

concurrency:
  group: forcing-test-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  SM_ARN: arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm
  S3_BUCKET: ciroh-community-ngen-datastream
  S3_TEST_PREFIX: test/cicd/forcing-test
  INIT: "00"

jobs:
  test-forcing:
    name: Run Forcing Processor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest execution JSON and build payload
        id: payload
        run: |
          # Find the most recent date that has a forcing execution.json for init 00
          LATEST=$(aws s3 ls "s3://${{ env.S3_BUCKET }}/forcings/v2.2_hydrofabric/" \
            | grep PRE | awk '{print $2}' | tr -d '/' | sort -r | head -20)

          FOUND=""
          for DIR in $LATEST; do
            EXEC_PATH="s3://${{ env.S3_BUCKET }}/forcings/v2.2_hydrofabric/${DIR}/forcing_short_range/${{ env.INIT }}/metadata/execution.json"
            if aws s3 ls "$EXEC_PATH" > /dev/null 2>&1; then
              FOUND="$EXEC_PATH"
              echo "Found execution JSON: $FOUND"
              break
            fi
          done

          if [ -z "$FOUND" ]; then
            echo "::error::No recent execution.json found"
            exit 1
          fi

          # Download and modify the execution JSON
          aws s3 cp "$FOUND" /tmp/execution.json

          # Modify: replace s3_prefix to test path, clean up fields, update tags
          jq --arg test_prefix "${{ env.S3_TEST_PREFIX }}" \
             'del(.instance_parameters.MaxCount, .instance_parameters.MinCount, .instance_parameters.InstanceId, .t0, .ii_s3_object_checked, .retry_attempt, .region) |
              .instance_parameters.TagSpecifications = [{"ResourceType": "instance", "Tags": [{"Key": "Project", "Value": "ci_forcing_test"}]}] |
              .commands |= map(gsub("--s3_prefix(?i) [^ ]+"; "--s3_prefix \($test_prefix)")) |
              .commands |= map(gsub("--start_date DAILY"; "--start_date DAILY --end_date DAILY"))' \
            /tmp/execution.json > /tmp/payload.json

          echo "Payload commands count: $(jq '.commands | length' /tmp/payload.json)"
          echo "Modified s3_prefix in commands:"
          jq -r '.commands[]' /tmp/payload.json | grep -o '\-\-s3_prefix [^ ]*' || true

      - name: Start and monitor execution
        id: monitor
        run: |
          EXEC_NAME="ci_forcing_test_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"

          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            aws stepfunctions get-execution-history \
              --execution-arn "$EXEC_ARN" \
              --query "events[?type=='TaskFailed' || type=='ExecutionFailed' || type=='LambdaFunctionFailed']" \
              --output json
            exit 1
          fi

      # ── Verify output files per VPU ──────────────────────────────────
      - name: Verify output files
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          FAILED=0
          for VPU in 01 02 03N 03S 03W 04 05 06 07 08 09 10L 10U 11 12 13 14 15 16 18; do
            FILE="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/ngen.t${{ env.INIT }}z.short_range.forcing.f001_f018.VPU_${VPU}.nc"
            if aws s3 ls "$FILE" > /dev/null 2>&1; then
              echo "OK: VPU_${VPU}"
            else
              echo "MISSING: VPU_${VPU} - $FILE"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "::error::Some VPU forcing files are missing"
            exit 1
          fi
          echo "All 20 VPU forcing files verified"

      # ── Clean up test output ─────────────────────────────────────────
      - name: Clean up test S3 output
        if: always()
        run: |
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/" --recursive || true

      - name: Post result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = '${{ steps.monitor.outputs.result }}' || 'DID_NOT_RUN';
            const icon = result === 'SUCCEEDED' ? '\u2705' : '\u274C';

            let body = `### Forcing Processor Test ${icon}\n\n`;
            body += `**Result: ${result}**\n\n`;
            body += `*Triggered by PR #${{ github.event.pull_request.number }}*`;

            const marker = 'Forcing Processor Test';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
