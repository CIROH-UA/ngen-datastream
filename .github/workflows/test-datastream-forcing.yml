name: Test Forcing Processor

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type to test"
        required: true
        type: choice
        options:
          - short_range
          - medium_range
      init:
        description: "Init cycle (e.g. 00, 06, 15)"
        required: false
        default: "15"
        type: string
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/terraform/services/nrds/datastreams/forcing/**'

concurrency:
  group: forcing-test-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  SM_ARN: arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm
  S3_BUCKET: ciroh-community-ngen-datastream
  S3_TEST_PREFIX: test/cicd/forcing
  INSTANCE_PROFILE: nrds_prod_ec2_profile
  PROD_VARS: infra/aws/terraform/services/nrds/envs/prod.tfvars
  CONFIG: .github/vpu-test/forcing.json

jobs:
  # ── Setup ────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ami: ${{ steps.ami.outputs.ami }}
      run_type: ${{ steps.params.outputs.run_type }}
      init: ${{ steps.params.outputs.init }}
      instance_type: ${{ steps.params.outputs.instance_type }}
      timeout_s: ${{ steps.params.outputs.timeout_s }}
      volume_size: ${{ steps.params.outputs.volume_size }}
      vpu_list: ${{ steps.params.outputs.vpu_list }}
      test_date: ${{ steps.params.outputs.test_date }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_TYPE="${{ inputs.run_type }}"
            INIT="${{ inputs.init }}"
          else
            RUN_TYPE=$(jq -r '.default_run_type' "${{ env.CONFIG }}")
            INIT=$(jq -r '.default_init' "${{ env.CONFIG }}")
          fi

          VPU_LIST=$(jq -r '.vpus | join(",")' "${{ env.CONFIG }}")

          if [ "$RUN_TYPE" = "medium_range" ]; then
            INSTANCE_TYPE=$(jq -r '.medium_range_instance_type // .instance_type' "${{ env.CONFIG }}")
            TIMEOUT_S=$(jq -r '.medium_range_timeout_s // .timeout_s' "${{ env.CONFIG }}")
          else
            INSTANCE_TYPE=$(jq -r '.instance_type' "${{ env.CONFIG }}")
            TIMEOUT_S=$(jq -r '.timeout_s' "${{ env.CONFIG }}")
          fi

          VOLUME_SIZE=$(jq -r '.volume_size' "${{ env.CONFIG }}")
          TEST_DATE=$(jq -r '.test_date' "${{ env.CONFIG }}")

          echo "run_type=$RUN_TYPE" >> "$GITHUB_OUTPUT"
          echo "init=$INIT" >> "$GITHUB_OUTPUT"
          echo "instance_type=$INSTANCE_TYPE" >> "$GITHUB_OUTPUT"
          echo "timeout_s=$TIMEOUT_S" >> "$GITHUB_OUTPUT"
          echo "volume_size=$VOLUME_SIZE" >> "$GITHUB_OUTPUT"
          echo "vpu_list=$VPU_LIST" >> "$GITHUB_OUTPUT"
          echo "test_date=$TEST_DATE" >> "$GITHUB_OUTPUT"

      - name: Look up AMI
        id: ami
        run: |
          AMI_VAR=$(jq -r '.ami_var' "${{ env.CONFIG }}")
          AMI=$(grep "$AMI_VAR" "${{ env.PROD_VARS }}" | grep -o 'ami-[a-z0-9]*')
          echo "ami=$AMI" >> "$GITHUB_OUTPUT"

  # ── Run forcing processor ──────────────────────────────────────
  test-forcing:
    name: "FP ${{ needs.setup.outputs.run_type }} init${{ needs.setup.outputs.init }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        run: |
          RUN_TYPE="${{ needs.setup.outputs.run_type }}"
          INIT="${{ needs.setup.outputs.init }}"
          AMI="${{ needs.setup.outputs.ami }}"
          INSTANCE_TYPE="${{ needs.setup.outputs.instance_type }}"
          TIMEOUT_S="${{ needs.setup.outputs.timeout_s }}"
          VOLUME_SIZE="${{ needs.setup.outputs.volume_size }}"
          VPU_LIST="${{ needs.setup.outputs.vpu_list }}"
          TEST_DATE="${{ needs.setup.outputs.test_date }}"

          RUN_TYPE_H=$(echo "$RUN_TYPE" | tr '[:lower:]' '[:upper:]')

          MEMBER_SUFFIX=""
          if [ "$RUN_TYPE" = "medium_range" ]; then
            MEMBER_SUFFIX="_0"
          fi

          # Read commands from config and replace placeholders
          jq -c '.commands[]' "${{ env.CONFIG }}" | while read -r cmd; do
            echo "$cmd" | jq -r '.' | \
              sed "s|{run_type_h}|${RUN_TYPE_H}|g" | \
              sed "s|{run_type_l}|${RUN_TYPE}|g" | \
              sed "s|{init}|${INIT}|g" | \
              sed "s|{member_suffix}|${MEMBER_SUFFIX}|g" | \
              sed "s|{vpu_list}|${VPU_LIST}|g" | \
              sed "s|{test_date}|${TEST_DATE}|g" | \
              sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
              sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g"
          done | jq -Rs 'split("\n") | map(select(length > 0))' > /tmp/commands.json

          # Build full payload
          jq -n \
            --slurpfile cmds /tmp/commands.json \
            --arg ami "$AMI" \
            --arg itype "$INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_forcing_${RUN_TYPE}_init${INIT}" \
            --argjson volsize "$VOLUME_SIZE" \
            --argjson timeout "$TIMEOUT_S" \
            '{
              commands: $cmds[0],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  { ResourceType: "instance", Tags: [{ Key: "Name", Value: $tag_name }, { Key: "Project", Value: $tag_name }] },
                  { ResourceType: "volume", Tags: [{ Key: "Name", Value: ($tag_name + "_vol") }] }
                ],
                BlockDeviceMappings: [{ DeviceName: "/dev/xvda", Ebs: { VolumeSize: $volsize, VolumeType: "gp3" } }]
              }
            }' > /tmp/payload.json

          echo "FP payload ($(jq '.commands | length' /tmp/payload.json) commands):"
          jq '.commands[3][:200]' /tmp/payload.json

      - name: Run and monitor
        id: monitor
        run: |
          RUN_TYPE="${{ needs.setup.outputs.run_type }}"
          INIT="${{ needs.setup.outputs.init }}"
          EXEC_NAME="ci_forcing_${RUN_TYPE}_init${INIT}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"

          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] FP $RUN_TYPE init$INIT: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            aws stepfunctions get-execution-history \
              --execution-arn "$EXEC_ARN" \
              --query "events[?type=='TaskFailed' || type=='ExecutionFailed' || type=='LambdaFunctionFailed']" \
              --output json
            exit 1
          fi

      - name: Verify output files
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          RUN_TYPE="${{ needs.setup.outputs.run_type }}"
          INIT="${{ needs.setup.outputs.init }}"
          PREFIX="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/forcing_${RUN_TYPE}/${INIT}/"
          VPU_LIST="${{ needs.setup.outputs.vpu_list }}"

          MISSING=0
          FOUND=0
          for VPU in $(echo "$VPU_LIST" | tr ',' ' '); do
            FILE=$(aws s3 ls "${PREFIX}" --recursive | grep "VPU_${VPU}.nc" || true)
            if [ -n "$FILE" ]; then
              echo "OK: VPU_${VPU} forcing file found"
              FOUND=$((FOUND + 1))
            else
              echo "::error::VPU_${VPU} forcing file missing at ${PREFIX}"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "Results: $FOUND found, $MISSING missing"
          if [ "$MISSING" -gt 0 ]; then
            exit 1
          fi

  # ── Clean up ─────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    needs: [setup, test-forcing]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up test S3 output
        run: |
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/" --recursive || true
