name: Test Datastream VPUs

on:
  workflow_dispatch:
    inputs:
      datastream:
        description: "Datastream to test"
        required: true
        type: choice
        options:
          - cfe-nom
          - lstm_0
          - routing-only
      vpu:
        description: "VPU to test (leave empty for all)"
        required: false
        type: string
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/terraform/services/nrds/datastreams/cfe-nom/**'
      - 'infra/aws/terraform/services/nrds/datastreams/lstm_0/**'
      - 'infra/aws/terraform/services/nrds/datastreams/routing-only/**'

concurrency:
  group: vpu-test-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  SM_ARN: arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm
  S3_BUCKET: ciroh-community-ngen-datastream
  S3_TEST_PREFIX: test/cicd/vpu-test
  INSTANCE_PROFILE: nrds_prod_ec2_profile
  PROD_VARS: infra/aws/terraform/services/nrds/envs/prod.tfvars

jobs:
  # ── Detect datastream and build VPU matrix ─────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build test matrix
        id: build
        run: |
          # Determine which datastreams to test
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATASTREAMS="${{ inputs.datastream }}"
          else
            # Detect all changed datastreams from PR
            DATASTREAMS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} \
              | grep '^infra/aws/terraform/services/nrds/datastreams/' \
              | sed 's|infra/aws/terraform/services/nrds/datastreams/||' \
              | cut -d'/' -f1 \
              | sort -u)
            if [ -z "$DATASTREAMS" ]; then
              echo "::error::Could not detect datastream from changed files"
              exit 1
            fi
          fi

          # Build matrix: one entry per datastream+VPU combo
          MATRIX="[]"
          for DS in $DATASTREAMS; do
            CONFIG=".github/vpu-test/${DS}.json"
            if [ ! -f "$CONFIG" ]; then
              echo "::warning::No test config for $DS — skipping"
              continue
            fi

            AMI_VAR=$(jq -r '.ami_var' "$CONFIG")
            AMI=$(grep "$AMI_VAR" "${{ env.PROD_VARS }}" | grep -o 'ami-[a-z0-9]*')

            if [ -n "${{ inputs.vpu }}" ]; then
              VPUS="[\"${{ inputs.vpu }}\"]"
            else
              VPUS=$(jq -c '.vpus' "$CONFIG")
            fi

            # Append each VPU as a matrix entry
            MATRIX=$(echo "$MATRIX" | jq -c --arg ds "$DS" --arg ami "$AMI" --argjson vpus "$VPUS" \
              '. + [$vpus[] | {datastream: $ds, vpu: ., ami: $ami}]')
          done

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Testing $(echo "$MATRIX" | jq length) combinations"

  # ── Test each VPU in parallel ──────────────────────────────────────
  test-vpu:
    name: "${{ matrix.datastream }} VPU ${{ matrix.vpu }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build execution payload
        id: payload
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          AMI="${{ matrix.ami }}"
          CONFIG=".github/vpu-test/${DS}.json"

          # Check for per-VPU instance type override, fallback to default
          OVERRIDE=$(jq -r --arg vpu "$VPU" '.instance_type_overrides[$vpu] // empty' "$CONFIG")
          INSTANCE_TYPE=${OVERRIDE:-$(jq -r '.instance_type' "$CONFIG")}
          VOLUME_SIZE=$(jq -r '.volume_size' "$CONFIG")
          TIMEOUT_S=$(jq -r '.timeout_s' "$CONFIG")
          INIT=$(jq -r '.init' "$CONFIG")

          # Calculate nprocs from instance type (vCPUs - 1)
          case "$INSTANCE_TYPE" in
            m8g.xlarge)  NPROCS=3 ;;
            m8g.2xlarge) NPROCS=7 ;;
            m8g.4xlarge) NPROCS=15 ;;
            *)           NPROCS=3 ;;
          esac

          # Build command from template
          CMD=$(jq -r '.command' "$CONFIG" | \
            sed "s|{vpu}|${VPU}|g" | \
            sed "s|{init}|${INIT}|g" | \
            sed "s|{nprocs}|${NPROCS}|g" | \
            sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
            sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g" | \
            sed "s|{datastream}|${DS}|g")

          # Build full execution payload
          jq -n \
            --arg cmd "$CMD" \
            --arg ami "$AMI" \
            --arg itype "$INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_vpu_test_${DS}_VPU${VPU}" \
            --argjson volsize "$VOLUME_SIZE" \
            --argjson timeout "$TIMEOUT_S" \
            '{
              commands: [$cmd],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  {
                    ResourceType: "instance",
                    Tags: [
                      { Key: "Name", Value: $tag_name },
                      { Key: "Project", Value: $tag_name }
                    ]
                  },
                  {
                    ResourceType: "volume",
                    Tags: [
                      { Key: "Name", Value: ($tag_name + "_vol") }
                    ]
                  }
                ],
                BlockDeviceMappings: [
                  {
                    DeviceName: "/dev/xvda",
                    Ebs: { VolumeSize: $volsize, VolumeType: "gp3" }
                  }
                ]
              }
            }' > /tmp/payload.json

          echo "Payload for VPU $VPU:"
          jq '.commands[0][:200]' /tmp/payload.json

      - name: Start and monitor execution
        id: monitor
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"

          EXEC_NAME="ci_vpu_${DS}_${VPU}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"

          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] VPU $VPU: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            aws stepfunctions get-execution-history \
              --execution-arn "$EXEC_ARN" \
              --query "events[?type=='TaskFailed' || type=='ExecutionFailed' || type=='LambdaFunctionFailed']" \
              --output json
            exit 1
          fi

      - name: Verify output files
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          FILE="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/${DS}/VPU_${VPU}/ngen-run.tar.gz"
          if aws s3 ls "$FILE" > /dev/null 2>&1; then
            echo "OK: ngen-run.tar.gz found for VPU_${VPU}"
          else
            echo "::error::ngen-run.tar.gz missing for VPU_${VPU} - $FILE"
            exit 1
          fi

  # ── Report results and clean up ────────────────────────────────────
  report:
    name: Report & Cleanup
    needs: [setup, test-vpu]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up test S3 output
        run: |
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/" --recursive || true

      - name: Post result to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const matrix = ${{ needs.setup.outputs.matrix }};
            const entries = matrix.include;
            const datastreams = [...new Set(entries.map(e => e.datastream))];
            const overall = '${{ needs.test-vpu.result }}';
            const icon = overall === 'success' ? '\u2705' : '\u274C';

            let body = `### VPU Test ${icon}\n\n`;
            body += `**Overall: ${overall}**\n\n`;
            for (const ds of datastreams) {
              const vpus = entries.filter(e => e.datastream === ds).map(e => e.vpu);
              body += `- **${ds}**: ${vpus.length} VPUs (${vpus.join(', ')})\n`;
            }
            body += `\n*Triggered by PR #${{ github.event.pull_request.number }}*`;

            const marker = 'VPU Test';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
