name: Test Datastream VPUs (Short + Medium Range)

on:
  workflow_dispatch:
    inputs:
      datastream:
        description: "Datastream to test"
        required: true
        type: choice
        options:
          - cfe-nom
          - lstm_0
          - routing-only
      vpu:
        description: "VPU to test (leave empty for all)"
        required: false
        type: string

concurrency:
  group: vpu-full-test-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  SM_ARN: arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm
  S3_BUCKET: ciroh-community-ngen-datastream
  S3_TEST_PREFIX: test/cicd/vpu-full-test
  INSTANCE_PROFILE: nrds_prod_ec2_profile
  PROD_VARS: infra/aws/terraform/services/nrds/envs/prod.tfvars
  CONFIG: .github/vpu-test/${{ inputs.datastream }}.json

jobs:
  # ── Build VPU matrix ─────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.vpus }}
      ami: ${{ steps.ami.outputs.ami }}
      has_mr: ${{ steps.check_mr.outputs.has_mr }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build VPU matrix
        id: matrix
        run: |
          if [ -n "${{ inputs.vpu }}" ]; then
            echo "vpus=[\"${{ inputs.vpu }}\"]" >> "$GITHUB_OUTPUT"
          else
            VPUS=$(jq -c '.vpus' "${{ env.CONFIG }}")
            echo "vpus=$VPUS" >> "$GITHUB_OUTPUT"
          fi

      - name: Look up AMI
        id: ami
        run: |
          AMI_VAR=$(jq -r '.ami_var' "${{ env.CONFIG }}")
          AMI=$(grep "$AMI_VAR" "${{ env.PROD_VARS }}" | grep -o 'ami-[a-z0-9]*')
          echo "ami=$AMI" >> "$GITHUB_OUTPUT"

      - name: Check for medium range config
        id: check_mr
        run: |
          MR_CMD=$(jq -r '.medium_range_command // empty' "${{ env.CONFIG }}")
          if [ -n "$MR_CMD" ]; then
            echo "has_mr=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mr=false" >> "$GITHUB_OUTPUT"
            echo "Datastream ${{ inputs.datastream }} has no medium range config — MR jobs will be skipped"
          fi

  # ── Short Range ──────────────────────────────────────────────────
  short-range:
    name: "SR VPU ${{ matrix.vpu }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        vpu: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        run: |
          VPU="${{ matrix.vpu }}"
          AMI="${{ needs.setup.outputs.ami }}"
          CONFIG="${{ env.CONFIG }}"

          OVERRIDE=$(jq -r --arg vpu "$VPU" '.instance_type_overrides[$vpu] // empty' "$CONFIG")
          INSTANCE_TYPE=${OVERRIDE:-$(jq -r '.instance_type' "$CONFIG")}
          INIT=$(jq -r '.init' "$CONFIG")

          case "$INSTANCE_TYPE" in
            m8g.xlarge)  NPROCS=3 ;;
            m8g.2xlarge) NPROCS=7 ;;
            m8g.4xlarge) NPROCS=15 ;;
            *)           NPROCS=3 ;;
          esac

          CMD=$(jq -r '.command' "$CONFIG" | \
            sed "s|{vpu}|${VPU}|g" | \
            sed "s|{init}|${INIT}|g" | \
            sed "s|{nprocs}|${NPROCS}|g" | \
            sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
            sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g" | \
            sed "s|{datastream}|${{ inputs.datastream }}|g")

          jq -n \
            --arg cmd "$CMD" \
            --arg ami "$AMI" \
            --arg itype "$INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_full_sr_VPU${VPU}" \
            --argjson volsize 64 \
            --argjson timeout 3600 \
            '{
              commands: [$cmd],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  { ResourceType: "instance", Tags: [{ Key: "Name", Value: $tag_name }, { Key: "Project", Value: $tag_name }] },
                  { ResourceType: "volume", Tags: [{ Key: "Name", Value: ($tag_name + "_vol") }] }
                ],
                BlockDeviceMappings: [{ DeviceName: "/dev/xvda", Ebs: { VolumeSize: $volsize, VolumeType: "gp3" } }]
              }
            }' > /tmp/payload.json

          echo "Short range payload for VPU $VPU:"
          jq '.commands[0][:200]' /tmp/payload.json

      - name: Run and monitor
        id: monitor
        run: |
          VPU="${{ matrix.vpu }}"
          EXEC_NAME="ci_full_sr_${VPU}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started SR: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"
          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] SR VPU $VPU: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then sleep 15; ELAPSED=$((ELAPSED + 15)); fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"; exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"; exit 1
          fi

      - name: Verify output
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          VPU="${{ matrix.vpu }}"
          PREFIX="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/${{ inputs.datastream }}/VPU_${VPU}/"
          FILE_COUNT=$(aws s3 ls "$PREFIX" --recursive | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "OK: short_range output found for VPU_${VPU} ($FILE_COUNT files)"
          else
            echo "::error::short_range output missing for VPU_${VPU} at $PREFIX"
            exit 1
          fi

  # ── Medium Range (skipped if datastream has no MR config) ────────
  medium-range:
    name: "MR VPU ${{ matrix.vpu }}"
    needs: setup
    if: needs.setup.outputs.has_mr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        vpu: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        run: |
          VPU="${{ matrix.vpu }}"
          AMI="${{ needs.setup.outputs.ami }}"
          CONFIG="${{ env.CONFIG }}"
          INIT=$(jq -r '.medium_range_init // .init' "$CONFIG")

          MR_OVERRIDE=$(jq -r --arg vpu "$VPU" '.medium_range_instance_type_overrides[$vpu] // empty' "$CONFIG")
          MR_INSTANCE_TYPE=${MR_OVERRIDE:-$(jq -r '.medium_range_instance_type // "m8g.2xlarge"' "$CONFIG")}

          case "$MR_INSTANCE_TYPE" in
            m8g.xlarge)  NPROCS=3 ;;
            m8g.2xlarge) NPROCS=7 ;;
            m8g.4xlarge) NPROCS=15 ;;
            *)           NPROCS=7 ;;
          esac

          CMD=$(jq -r '.medium_range_command' "$CONFIG" | \
            sed "s|{vpu}|${VPU}|g" | \
            sed "s|{init}|${INIT}|g" | \
            sed "s|{nprocs}|${NPROCS}|g" | \
            sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
            sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g")

          jq -n \
            --arg cmd "$CMD" \
            --arg ami "$AMI" \
            --arg itype "$MR_INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_full_mr_VPU${VPU}" \
            --argjson volsize 64 \
            --argjson timeout 7200 \
            '{
              commands: [$cmd],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  { ResourceType: "instance", Tags: [{ Key: "Name", Value: $tag_name }, { Key: "Project", Value: $tag_name }] },
                  { ResourceType: "volume", Tags: [{ Key: "Name", Value: ($tag_name + "_vol") }] }
                ],
                BlockDeviceMappings: [{ DeviceName: "/dev/xvda", Ebs: { VolumeSize: $volsize, VolumeType: "gp3" } }]
              }
            }' > /tmp/payload.json

          echo "Medium range payload for VPU $VPU:"
          jq '.commands[0][:200]' /tmp/payload.json

      - name: Run and monitor
        id: monitor
        run: |
          VPU="${{ matrix.vpu }}"
          EXEC_NAME="ci_full_mr_${VPU}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started MR: $EXEC_ARN"

          TIMEOUT=4800
          ELAPSED=0
          STATUS="RUNNING"
          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] MR VPU $VPU: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then sleep 15; ELAPSED=$((ELAPSED + 15)); fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"; exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"; exit 1
          fi

      - name: Verify output
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          VPU="${{ matrix.vpu }}"
          PREFIX="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/${{ inputs.datastream }}-mr/VPU_${VPU}/"
          FILE_COUNT=$(aws s3 ls "$PREFIX" --recursive | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "OK: medium_range output found for VPU_${VPU} ($FILE_COUNT files)"
          else
            echo "::error::medium_range output missing for VPU_${VPU} at $PREFIX"
            exit 1
          fi

  # ── Clean up ─────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    needs: [setup, short-range, medium-range]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up test S3 output
        run: |
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/" --recursive || true
