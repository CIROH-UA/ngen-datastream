name: Test Datastream VPUs (Short + Medium Range)

on:
  workflow_dispatch:
    inputs:
      datastream:
        description: "Datastream to test (or 'all')"
        required: true
        type: choice
        options:
          - all
          - cfe-nom
          - lstm_0
          - routing-only
      vpu:
        description: "VPU to test (leave empty for all)"
        required: false
        type: string

concurrency:
  group: vpu-full-test-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  SM_ARN: arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm
  S3_BUCKET: ciroh-community-ngen-datastream
  S3_TEST_PREFIX: test/cicd/vpu-full-test
  INSTANCE_PROFILE: nrds_prod_ec2_profile
  PROD_VARS: infra/aws/terraform/services/nrds/envs/prod.tfvars

jobs:
  # ── Build test matrices ────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sr_matrix: ${{ steps.build.outputs.sr_matrix }}
      mr_matrix: ${{ steps.build.outputs.mr_matrix }}
      has_mr: ${{ steps.build.outputs.has_mr }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test matrices
        id: build
        run: |
          # Determine which datastreams to test
          if [ "${{ inputs.datastream }}" = "all" ]; then
            DATASTREAMS=$(ls .github/vpu-test/*.json | xargs -I{} basename {} .json)
          else
            DATASTREAMS="${{ inputs.datastream }}"
          fi

          SR_MATRIX="[]"
          MR_MATRIX="[]"

          for DS in $DATASTREAMS; do
            CONFIG=".github/vpu-test/${DS}.json"
            if [ ! -f "$CONFIG" ]; then
              echo "::warning::No test config for $DS — skipping"
              continue
            fi

            AMI_VAR=$(jq -r '.ami_var' "$CONFIG")
            AMI=$(grep "$AMI_VAR" "${{ env.PROD_VARS }}" | grep -o 'ami-[a-z0-9]*')

            if [ -n "${{ inputs.vpu }}" ]; then
              VPUS="[\"${{ inputs.vpu }}\"]"
            else
              VPUS=$(jq -c '.vpus' "$CONFIG")
            fi

            # Add SR entries
            SR_MATRIX=$(echo "$SR_MATRIX" | jq -c --arg ds "$DS" --arg ami "$AMI" --argjson vpus "$VPUS" \
              '. + [$vpus[] | {datastream: $ds, vpu: ., ami: $ami}]')

            # Add MR entries only if datastream has medium range config
            MR_CMD=$(jq -r '.medium_range_command // empty' "$CONFIG")
            if [ -n "$MR_CMD" ]; then
              MR_MATRIX=$(echo "$MR_MATRIX" | jq -c --arg ds "$DS" --arg ami "$AMI" --argjson vpus "$VPUS" \
                '. + [$vpus[] | {datastream: $ds, vpu: ., ami: $ami}]')
            fi
          done

          HAS_MR="false"
          if [ "$(echo "$MR_MATRIX" | jq length)" -gt 0 ]; then
            HAS_MR="true"
          fi

          echo "sr_matrix={\"include\":$SR_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "mr_matrix={\"include\":$MR_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "has_mr=$HAS_MR" >> "$GITHUB_OUTPUT"
          echo "SR: $(echo "$SR_MATRIX" | jq length) combos, MR: $(echo "$MR_MATRIX" | jq length) combos"

  # ── Short Range ──────────────────────────────────────────────────
  short-range:
    name: "SR ${{ matrix.datastream }} VPU ${{ matrix.vpu }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.sr_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          AMI="${{ matrix.ami }}"
          CONFIG=".github/vpu-test/${DS}.json"

          OVERRIDE=$(jq -r --arg vpu "$VPU" '.instance_type_overrides[$vpu] // empty' "$CONFIG")
          INSTANCE_TYPE=${OVERRIDE:-$(jq -r '.instance_type' "$CONFIG")}
          VOLUME_SIZE=$(jq -r '.volume_size' "$CONFIG")
          TIMEOUT_S=$(jq -r '.timeout_s' "$CONFIG")
          INIT=$(jq -r '.init' "$CONFIG")

          case "$INSTANCE_TYPE" in
            m8g.xlarge)  NPROCS=3 ;;
            m8g.2xlarge) NPROCS=7 ;;
            m8g.4xlarge) NPROCS=15 ;;
            *)           NPROCS=3 ;;
          esac

          CMD=$(jq -r '.command' "$CONFIG" | \
            sed "s|{vpu}|${VPU}|g" | \
            sed "s|{init}|${INIT}|g" | \
            sed "s|{nprocs}|${NPROCS}|g" | \
            sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
            sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g" | \
            sed "s|{datastream}|${DS}|g")

          jq -n \
            --arg cmd "$CMD" \
            --arg ami "$AMI" \
            --arg itype "$INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_full_sr_${DS}_VPU${VPU}" \
            --argjson volsize "$VOLUME_SIZE" \
            --argjson timeout "$TIMEOUT_S" \
            '{
              commands: [$cmd],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  { ResourceType: "instance", Tags: [{ Key: "Name", Value: $tag_name }, { Key: "Project", Value: $tag_name }] },
                  { ResourceType: "volume", Tags: [{ Key: "Name", Value: ($tag_name + "_vol") }] }
                ],
                BlockDeviceMappings: [{ DeviceName: "/dev/xvda", Ebs: { VolumeSize: $volsize, VolumeType: "gp3" } }]
              }
            }' > /tmp/payload.json

          echo "SR payload for $DS VPU $VPU:"
          jq '.commands[0][:200]' /tmp/payload.json

      - name: Run and monitor
        id: monitor
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          EXEC_NAME="ci_full_sr_${DS}_${VPU}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started SR: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"
          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] SR $DS VPU $VPU: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then sleep 15; ELAPSED=$((ELAPSED + 15)); fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            aws stepfunctions get-execution-history \
              --execution-arn "$EXEC_ARN" \
              --query "events[?type=='TaskFailed' || type=='ExecutionFailed' || type=='LambdaFunctionFailed']" \
              --output json
            exit 1
          fi

      - name: Verify output
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          FILE="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/${DS}/VPU_${VPU}/ngen-run.tar.gz"
          if aws s3 ls "$FILE" > /dev/null 2>&1; then
            echo "OK: ngen-run.tar.gz found for ${DS} VPU_${VPU}"
          else
            echo "::error::ngen-run.tar.gz missing for ${DS} VPU_${VPU} - $FILE"
            exit 1
          fi

  # ── Medium Range (skipped if no datastreams have MR config) ────────
  medium-range:
    name: "MR ${{ matrix.datastream }} VPU ${{ matrix.vpu }}"
    needs: setup
    if: needs.setup.outputs.has_mr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.mr_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          AMI="${{ matrix.ami }}"
          CONFIG=".github/vpu-test/${DS}.json"
          INIT=$(jq -r '.medium_range_init // .init' "$CONFIG")

          VOLUME_SIZE=$(jq -r '.volume_size' "$CONFIG")
          MR_OVERRIDE=$(jq -r --arg vpu "$VPU" '.medium_range_instance_type_overrides[$vpu] // empty' "$CONFIG")
          MR_INSTANCE_TYPE=${MR_OVERRIDE:-$(jq -r '.medium_range_instance_type // "m8g.2xlarge"' "$CONFIG")}
          MR_TIMEOUT=$(jq -r '.medium_range_timeout_s // 7200' "$CONFIG")

          case "$MR_INSTANCE_TYPE" in
            m8g.xlarge)  NPROCS=3 ;;
            m8g.2xlarge) NPROCS=7 ;;
            m8g.4xlarge) NPROCS=15 ;;
            *)           NPROCS=7 ;;
          esac

          CMD=$(jq -r '.medium_range_command' "$CONFIG" | \
            sed "s|{vpu}|${VPU}|g" | \
            sed "s|{init}|${INIT}|g" | \
            sed "s|{nprocs}|${NPROCS}|g" | \
            sed "s|{s3_bucket}|${{ env.S3_BUCKET }}|g" | \
            sed "s|{s3_test_prefix}|${{ env.S3_TEST_PREFIX }}|g" | \
            sed "s|{datastream}|${DS}|g")

          jq -n \
            --arg cmd "$CMD" \
            --arg ami "$AMI" \
            --arg itype "$MR_INSTANCE_TYPE" \
            --arg profile "${{ env.INSTANCE_PROFILE }}" \
            --arg tag_name "ci_full_mr_${DS}_VPU${VPU}" \
            --argjson volsize "$VOLUME_SIZE" \
            --argjson timeout "$MR_TIMEOUT" \
            '{
              commands: [$cmd],
              run_options: {
                ii_terminate_instance: true,
                ii_delete_volume: true,
                ii_check_s3: true,
                ii_cheapo: true,
                timeout_s: $timeout,
                n_retries_allowed: 2
              },
              instance_parameters: {
                ImageId: $ami,
                InstanceType: $itype,
                IamInstanceProfile: { Name: $profile },
                TagSpecifications: [
                  { ResourceType: "instance", Tags: [{ Key: "Name", Value: $tag_name }, { Key: "Project", Value: $tag_name }] },
                  { ResourceType: "volume", Tags: [{ Key: "Name", Value: ($tag_name + "_vol") }] }
                ],
                BlockDeviceMappings: [{ DeviceName: "/dev/xvda", Ebs: { VolumeSize: $volsize, VolumeType: "gp3" } }]
              }
            }' > /tmp/payload.json

          echo "MR payload for $DS VPU $VPU:"
          jq '.commands[0][:200]' /tmp/payload.json

      - name: Run and monitor
        id: monitor
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          EXEC_NAME="ci_full_mr_${DS}_${VPU}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ env.SM_ARN }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/payload.json" \
            --query 'executionArn' --output text)
          echo "Started MR: $EXEC_ARN"

          TIMEOUT=4800
          ELAPSED=0
          STATUS="RUNNING"
          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] MR $DS VPU $VPU: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then sleep 15; ELAPSED=$((ELAPSED + 15)); fi
          done

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            aws stepfunctions get-execution-history \
              --execution-arn "$EXEC_ARN" \
              --query "events[?type=='TaskFailed' || type=='ExecutionFailed' || type=='LambdaFunctionFailed']" \
              --output json
            exit 1
          fi

      - name: Verify output
        if: steps.monitor.outputs.result == 'SUCCEEDED'
        run: |
          DS="${{ matrix.datastream }}"
          VPU="${{ matrix.vpu }}"
          FILE="s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/${DS}-mr/VPU_${VPU}/ngen-run.tar.gz"
          if aws s3 ls "$FILE" > /dev/null 2>&1; then
            echo "OK: MR ngen-run.tar.gz found for ${DS} VPU_${VPU}"
          else
            echo "::error::MR ngen-run.tar.gz missing for ${DS} VPU_${VPU} - $FILE"
            exit 1
          fi

  # ── Clean up ─────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    needs: [setup, short-range, medium-range]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up test S3 output
        run: |
          aws s3 rm "s3://${{ env.S3_BUCKET }}/${{ env.S3_TEST_PREFIX }}/" --recursive || true
