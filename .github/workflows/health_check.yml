name: NRDS Health Check and Auto-Rerun

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYYMMDD)'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYYMMDD)'
        required: false
        default: ''
      vpus:
        description: 'VPUs (comma-separated or "all")'
        required: false
        default: 'all'
      run_types:
        description: 'Run types (comma-separated or "all")'
        required: false
        default: 'all'
      auto_rerun:
        description: 'Automatically trigger reruns for failures'
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC

env:
  TF_VAR_FILE: variables.tfvars
  AWS_REGION: us-east-2
  TERRAFORM_VERSION: 1.9.0
  ENVIRONMENT: dev 

permissions:
  contents: read
  id-token: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.health_check.outputs.has_failures }}
      failure_count: ${{ steps.health_check.outputs.failure_count }}
      failures: ${{ steps.health_check.outputs.failures }}
      auto_rerun: ${{ steps.params.outputs.auto_rerun }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set Parameters
        id: params
        run: |
          # Default: check last 7 days for manual runs, yesterday for scheduled
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.start_date }}" ]; then
              START_DATE="${{ github.event.inputs.start_date }}"
            else
              START_DATE=$(date -d '7 days ago' +%Y%m%d)
            fi
            
            if [ -n "${{ github.event.inputs.end_date }}" ]; then
              END_DATE="${{ github.event.inputs.end_date }}"
            else
              END_DATE=$(date -d 'yesterday' +%Y%m%d)
            fi
            
            VPUS="${{ github.event.inputs.vpus }}"
            RUN_TYPES="${{ github.event.inputs.run_types }}"
            AUTO_RERUN="${{ github.event.inputs.auto_rerun }}"
          else
            # Scheduled run - check yesterday only
            START_DATE=$(date -d 'yesterday' +%Y%m%d)
            END_DATE=$(date -d 'yesterday' +%Y%m%d)
            VPUS="all"
            RUN_TYPES="all"
            AUTO_RERUN="true"
          fi
          
          echo "start_date=$START_DATE" >> $GITHUB_OUTPUT
          echo "end_date=$END_DATE" >> $GITHUB_OUTPUT
          echo "vpus=$VPUS" >> $GITHUB_OUTPUT
          echo "run_types=$RUN_TYPES" >> $GITHUB_OUTPUT
          echo "auto_rerun=$AUTO_RERUN" >> $GITHUB_OUTPUT
          
          echo "Health check parameters:"
          echo "  Date range: $START_DATE to $END_DATE"
          echo "  VPUs: $VPUS"
          echo "  Run types: $RUN_TYPES"
          echo "  Auto rerun: $AUTO_RERUN"

      - name: Run Health Check and Capture Failures
        id: health_check
        run: |
          chmod +x ./infra/aws/shell/check_datastream_outputs.sh
          ./infra/aws/shell/check_datastream_outputs.sh \
            --start ${{ steps.params.outputs.start_date }} \
            --end ${{ steps.params.outputs.end_date }} \
            --vpus ${{ steps.params.outputs.vpus }} \
            --run_types ${{ steps.params.outputs.run_types }} 2>&1 | tee health_output.txt
          
          # Parse failures into JSON array
          failures=$(grep "missing" health_output.txt | awk '{print $1}' | while read url; do
            date=$(echo "$url" | sed -n 's/.*ngen\.\([0-9]\{8\}\).*/\1/p')
            type=$(echo "$url" | sed -n 's/.*ngen\.[0-9]\{8\}\/\([^\/]*\).*/\1/p')
            cycle=$(echo "$url" | sed -n "s/.*\/$type\/\([0-9]\{2\}\).*/\1/p")
            vpu=$(echo "$url" | sed -n 's/.*VPU_\([^\/]*\).*/\1/p')
            
            if [[ "$type" == "medium_range" ]]; then
              ens=$(echo "$url" | sed -n 's/.*\/[0-9]\{2\}\/\([0-9]\)\/VPU.*/\1/p')
              echo "{\"date\":\"$date\",\"type\":\"$type\",\"cycle\":\"$cycle\",\"ensemble\":\"$ens\",\"vpu\":\"$vpu\"}"
            else
              echo "{\"date\":\"$date\",\"type\":\"$type\",\"cycle\":\"$cycle\",\"vpu\":\"$vpu\"}"
            fi
          done | jq -s '.')
          
          # Set outputs
          echo "failures<<EOF" >> $GITHUB_OUTPUT
          echo "$failures" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          count=$(echo "$failures" | jq 'length')
          echo "has_failures=$([ $count -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "failure_count=$count" >> $GITHUB_OUTPUT
          
          echo ""
          echo "Total failures found: $count"
          if [ $count -gt 0 ]; then
            echo "$failures" | jq '.'
          fi

  terraform-check:
    name: Terraform Quality Checks
    needs: health-check
    if: needs.health-check.outputs.has_failures == 'true' && needs.health-check.outputs.auto_rerun == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws/terraform
    
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      security-events: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install Python dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
        pip install --upgrade pip
        pip install --upgrade awscli boto3 pandas

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActions-TerraformCheck

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false
    
    - name: Terraform Format Check
      id: fmt
      run: terraform fmt -check -recursive
      continue-on-error: true
    
    - name: Terraform Init
      id: init
      run: terraform init -backend-config=backend-${ENVIRONMENT}.hcl
 
    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
    
    - name: Check for tfvars files
      id: check_tfvars
      run: |
        echo "Checking for required tfvars files..."
        
        # Check if the main tfvars file exists
        if [ ! -f "${{ env.TF_VAR_FILE }}" ]; then
          echo "::error::Missing required tfvars file: ${{ env.TF_VAR_FILE }}"
          exit 1
        fi
        
        echo "::notice::Found tfvars file: ${{ env.TF_VAR_FILE }}"
        
        # Validate tfvars syntax
        terraform fmt -check "${{ env.TF_VAR_FILE }}" || {
          echo "::warning::File ${{ env.TF_VAR_FILE }} is not properly formatted"
        }
        
        # Optionally check for environment-specific tfvars if they exist
        if [ -d "environments" ]; then
          tfvars_count=$(find environments -name "*.tfvars" -type f | wc -l)
          if [ "$tfvars_count" -gt 0 ]; then
            echo "::notice::Found $tfvars_count additional environment tfvars file(s)"
            find environments -name "*.tfvars" -type f
          fi
        fi

    - name: Run tfsec Security Scan
      id: tfsec
      uses: aquasecurity/tfsec-pr-commenter-action@v1.3.1
      with:
        github_token: ${{ github.token }}
        working_directory: infra/aws/terraform
        soft_fail_commenter: true
      continue-on-error: true
    
    - name: Run Checkov Security Scan
      id: checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: infra/aws/terraform
        framework: terraform
        output_format: cli,sarif
        output_file_path: console,results.sarif
        soft_fail: true
      continue-on-error: true
    
    - name: Upload Checkov Results
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
      continue-on-error: true
    
    - name: Terraform Plan
      id: plan
      run: |
        terraform plan -var-file=./${{ env.TF_VAR_FILE }} -no-color -out=tfplan
        terraform show -no-color tfplan > plan_output.txt
      continue-on-error: true
    
    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ github.sha }}
        path: infra/aws/terraform/tfplan
        retention-days: 10
    
    - name: Upload Plan Output
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-output-${{ github.sha }}
        path: infra/aws/terraform/plan_output.txt
        retention-days: 10
    
    - name: Check for Plan Failures
      if: steps.plan.outcome == 'failure'
      run: |
        echo "::warning::Terraform plan failed but continuing workflow"
        echo "Plan failed with errors. Check the plan output for details."
      continue-on-error: true
    
    - name: Check for Format Failures
      if: steps.fmt.outcome == 'failure'
      run: |
        echo "::error::Terraform files are not properly formatted. Run 'terraform fmt -recursive' locally."
      continue-on-error: true

  terraform-apply:
    name: Terraform Apply
    needs: [terraform-check, health-check]
    runs-on: ubuntu-latest
    if: needs.health-check.outputs.has_failures == 'true' && needs.health-check.outputs.auto_rerun == 'true'
    outputs:
      rerun_matrix: ${{ steps.create_matrix.outputs.matrix }}
    
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install Python dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
        pip install --upgrade pip
        pip install --upgrade awscli boto3 pandas

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActions-TerraformApply

    - name: Generate execution files
      run: |
        cd infra/aws
        echo "Working directory: $(pwd)"
        echo "Generating VPU execution files..."
        python python/src/research_datastream/gen_vpu_execs.py \
          --arch arm \
          --inputs terraform/modules/schedules/config/execution_forecast_inputs.json \
          --ami_file terraform/modules/schedules/config/community_ami.txt \
          --exec_template_vpu terraform/modules/schedules/executions/templates/execution_datastream_VPU_template.json \
          --exec_template_fp terraform/modules/schedules/executions/templates/execution_datastream_fp_template.json \
          --out_dir rerun_executions
        echo "::notice::Execution files generated successfully"
        
        # List generated files for verification
        echo "Generated execution file structure:"
        find rerun_executions -type f -name "*.json" | head -20
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false
    
    - name: Terraform Init
      working-directory: infra/aws/terraform
      run: terraform init -backend-config=backend-${ENVIRONMENT}.hcl
    
    - name: Download Plan Artifact
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan-${{ github.sha }}
        path: infra/aws/terraform
    
    - name: Terraform Apply
      id: apply
      working-directory: infra/aws/terraform
      run: |
        echo "::notice::Starting Terraform Apply..."
        terraform apply -var-file="variables.tfvars" -auto-approve
        echo "::notice::Terraform Apply completed successfully"
    
    - name: Terraform Output
      if: success()
      working-directory: infra/aws/terraform
      run: |
        echo "::group::Terraform Outputs"
        terraform output -json > terraform_outputs.json
        cat terraform_outputs.json
        echo "::endgroup::"
    
    - name: Upload Terraform Outputs
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: terraform-outputs-${{ github.sha }}
        path: infra/aws/terraform/terraform_outputs.json
        retention-days: 30

    - name: Create Rerun Matrix and Execution Files
      id: create_matrix
      run: |
        cd ${{ github.workspace }}
        
        failures='${{ needs.health-check.outputs.failures }}'
        
        echo "Processing failures:"
        echo "$failures" | jq '.'
        
        # Create directory for modified execution files
        mkdir -p rerun_execution_files
        
        # Process failures and create execution files
        echo "$failures" | jq -c '.[]' | while read -r failure; do
          date=$(echo "$failure" | jq -r '.date')
          type=$(echo "$failure" | jq -r '.type')
          cycle=$(echo "$failure" | jq -r '.cycle')
          vpu=$(echo "$failure" | jq -r '.vpu')
          ensemble=$(echo "$failure" | jq -r '.ensemble // "0"')
          
          echo "Processing: $type - VPU $vpu - Date $date - Cycle $cycle - Ensemble $ensemble"
          
          # Determine source execution file path and output file
          if [ "$type" = "medium_range" ]; then
            source_file="infra/aws/rerun_executions/${type}/${cycle}/${ensemble}/execution_datastream_${vpu}.json"
            output_file="rerun_execution_files/${type}_${cycle}_${ensemble}_${vpu}_${date}.json"
            s3_prefix="ngen.${date}/${type}/${cycle}/${ensemble}/VPU_${vpu}"
          else
            # Handles short_range, analysis_assim, analysis_assim_extend, etc.
            source_file="infra/aws/rerun_executions/${type}/${cycle}/execution_datastream_${vpu}.json"
            output_file="rerun_execution_files/${type}_${cycle}_${vpu}_${date}.json"
            s3_prefix="ngen.${date}/${type}/${cycle}/VPU_${vpu}"
          fi
          
          if [ ! -f "$source_file" ]; then
            echo "ERROR: Source file not found: $source_file"
            echo "Checking directory contents:"
            ls -la "infra/aws/rerun_executions/${type}/${cycle}/" 2>/dev/null || echo "Directory not found"
            continue
          fi
          
          echo "Found source file: $source_file"
          
          # Modify execution file with correct date and S3 prefix
          jq --arg DATE "$date" \
             --arg S3_PREFIX "$s3_prefix" \
             --arg VPU "$vpu" \
             --arg CYCLE "$cycle" \
             --arg ENSEMBLE "$ensemble" \
             --arg TYPE "$type" '
            # Update EC2 tags
            .instance_parameters.TagSpecifications = [{
              "ResourceType": "instance",
              "Tags": [
                {"Key": "Project", "Value": "nrds_rerun_\($VPU)_\($DATE)"},
                {"Key": "RerunDate", "Value": $DATE},
                {"Key": "Cycle", "Value": $CYCLE},
                {"Key": "RunType", "Value": "rerun"},
                {"Key": "OriginalFailure", "Value": "true"}
              ]
            }] |
            # Update commands - replace template placeholders
            .commands |= map(
              # Replace actual template variables from execution_datastream_VPU_template.json
              gsub("\\$VPU"; $VPU)
              | gsub("\\$NPROCS"; "4")
              | gsub("\\$RUN_TYPE_L"; $TYPE)
              | gsub("\\$RUN_TYPE_H"; ($TYPE | ascii_upcase))
              | gsub("\\$INIT"; $CYCLE)
              | gsub("\\$FCST"; if $TYPE == "short_range" then "f001_f018" elif $TYPE == "medium_range" then "f001_f240" else "tm27_tm00" end)
              | gsub("\\$MEMBER"; if $ENSEMBLE == "0" then "" else $ENSEMBLE end)
              # Replace date placeholders
              | gsub("ngen\\.DAILY"; "ngen.\($DATE)")
              | gsub("DAILY"; $DATE)
              # Fix start/end date parameters
              | gsub("-s [0-9]{10}"; "-s \($DATE)0100")
              | gsub("-e [0-9]{10}"; "-e \($DATE)0000")
            )
          ' "$source_file" > "$output_file"
          
          if [ $? -eq 0 ] && [ -f "$output_file" ]; then
            echo "✓ Created: $output_file"
            # Show a snippet of the modified commands for verification
            echo "  Commands preview:"
            jq -r '.commands[0:2][]' "$output_file" 2>/dev/null | head -3 || echo "  (could not preview)"
          else
            echo "✗ Failed to create: $output_file"
          fi
        done
        
        # Verify files were created
        file_count=$(ls -1 rerun_execution_files/*.json 2>/dev/null | wc -l)
        echo "Total execution files created: $file_count"
        
        if [ $file_count -eq 0 ]; then
          echo "ERROR: No execution files were created!"
          echo "::error::Failed to create any rerun execution files"
          exit 1
        fi
        
        # Show a sample execution file for debugging
        echo "Sample execution file content:"
        first_file=$(ls rerun_execution_files/*.json 2>/dev/null | head -1)
        if [ -n "$first_file" ]; then
          echo "File: $first_file"
          cat "$first_file" | jq '.' | head -50
        fi
        
        # Build matrix from created files
        matrix_items=()
        for file in rerun_execution_files/*.json; do
          [ ! -f "$file" ] && continue
          
          basename_file=$(basename "$file")
          echo "Processing file for matrix: $basename_file"
          
          # Parse filename patterns
          if [[ "$basename_file" =~ ^medium_range_([0-9]{2})_([0-9])_([^_]+)_([0-9]{8})\.json$ ]]; then
            cycle="${BASH_REMATCH[1]}"
            ensemble="${BASH_REMATCH[2]}"
            vpu="${BASH_REMATCH[3]}"
            date="${BASH_REMATCH[4]}"
            type="medium_range"
          elif [[ "$basename_file" =~ ^short_range_([0-9]{2})_([^_]+)_([0-9]{8})\.json$ ]]; then
            cycle="${BASH_REMATCH[1]}"
            vpu="${BASH_REMATCH[2]}"
            date="${BASH_REMATCH[3]}"
            type="short_range"
            ensemble="0"
          elif [[ "$basename_file" =~ ^analysis_assim_([0-9]{2})_([^_]+)_([0-9]{8})\.json$ ]]; then
            cycle="${BASH_REMATCH[1]}"
            vpu="${BASH_REMATCH[2]}"
            date="${BASH_REMATCH[3]}"
            type="analysis_assim"
            ensemble="0"
          elif [[ "$basename_file" =~ ^analysis_assim_extend_([0-9]{2})_([^_]+)_([0-9]{8})\.json$ ]]; then
            cycle="${BASH_REMATCH[1]}"
            vpu="${BASH_REMATCH[2]}"
            date="${BASH_REMATCH[3]}"
            type="analysis_assim_extend"
            ensemble="0"
          else
            echo "WARNING: Could not parse filename: $basename_file"
            continue
          fi
          
          echo "  → Parsed as: type=$type, cycle=$cycle, vpu=$vpu, date=$date, ensemble=$ensemble"
          matrix_items+=("{\"type\":\"$type\",\"cycle\":\"$cycle\",\"ensemble\":\"$ensemble\",\"vpu\":\"$vpu\",\"date\":\"$date\",\"file\":\"$basename_file\"}")
        done
        
        # Create matrix JSON
        if [ ${#matrix_items[@]} -eq 0 ]; then
          echo "ERROR: No valid execution files were parsed for matrix!"
          echo "::error::Failed to create rerun matrix - no valid execution files"
          exit 1
        fi
        
        echo "Matrix will contain ${#matrix_items[@]} items"
        
        # Join array elements properly
        printf -v matrix_items_joined '%s,' "${matrix_items[@]}"
        matrix_items_joined="${matrix_items_joined%,}"  # Remove trailing comma
        
        matrix_json="{\"include\":[$matrix_items_joined]}"
        
        echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
        
        echo "Rerun matrix created successfully:"
        echo "$matrix_json" | jq '.'
    

    - name: Debug Matrix Output
      if: always()
      run: |
        echo "Matrix JSON length: $(echo '${{ steps.create_matrix.outputs.matrix }}' | wc -c)"
        echo "Matrix content:"
        echo '${{ steps.create_matrix.outputs.matrix }}' | jq '.' || echo "Failed to parse matrix as JSON"
        echo "Number of matrix items: $(echo '${{ steps.create_matrix.outputs.matrix }}' | jq '.include | length' 2>/dev/null || echo '0')"

    - name: Upload Execution Files
      uses: actions/upload-artifact@v4
      with:
        name: rerun-execution-files
        path: rerun_execution_files/
        retention-days: 7

  execute-reruns:
    name: Execute Rerun - ${{ matrix.type }} VPU ${{ matrix.vpu }} (${{ matrix.date }})
    needs: terraform-apply
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5  # Limit concurrent reruns
      matrix: ${{ fromJson(needs.terraform-apply.outputs.rerun_matrix) }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Rerun-${{ matrix.vpu }}-${{ matrix.date }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install --upgrade awscli

      - name: Download Execution Files
        uses: actions/download-artifact@v4
        with:
          name: rerun-execution-files
          path: rerun_execution_files/

      - name: Get State Machine ARN
        id: get_sm_arn
        run: |
          ARN=$(aws ssm get-parameter \
            --name "/datastream/state-machine-arn" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"
          echo "State Machine ARN: $ARN"

      - name: Display Execution File
        run: |
          echo "Execution file for ${{ matrix.type }} VPU ${{ matrix.vpu }} Date ${{ matrix.date }}:"
          cat rerun_execution_files/${{ matrix.file }}

      - name: Start Step Functions Execution
        id: start_execution
        run: |
          TS=$(date +'%Y%m%d%H%M%S')
          NAME="rerun-${{ matrix.type }}-${{ matrix.vpu }}-${{ matrix.date }}-${{ matrix.cycle }}-${TS}"
          
          execution_arn=$(aws stepfunctions start-execution \
            --state-machine-arn ${{ steps.get_sm_arn.outputs.arn }} \
            --name "$NAME" \
            --input "file://rerun_execution_files/${{ matrix.file }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'executionArn' \
            --output text)
          
          echo "execution_arn=$execution_arn" >> "$GITHUB_OUTPUT"
          echo "Execution ARN: $execution_arn"
          echo "Execution Name: $NAME"

      - name: Monitor Execution
        run: |
          execution_arn="${{ steps.start_execution.outputs.execution_arn }}"
          
          echo "Monitoring execution: $execution_arn"
          
          status="RUNNING"
          attempt=0
          max_attempts=360  # 30 minutes with 5 second intervals
          
          while [ "$status" = "RUNNING" ] && [ $attempt -lt $max_attempts ]; do
            sleep 5
            attempt=$((attempt + 1))
            
            status=$(aws stepfunctions describe-execution \
              --execution-arn "$execution_arn" \
              --region ${{ env.AWS_REGION }} \
              --query 'status' \
              --output text)
            
            if [ $((attempt % 12)) -eq 0 ]; then  # Print every minute
              echo "Status after $((attempt * 5))s: $status"
            fi
          done
          
          echo "Final status: $status"
          
          if [ "$status" = "SUCCEEDED" ]; then
            echo "✅ Rerun succeeded for ${{ matrix.type }} VPU ${{ matrix.vpu }} Date ${{ matrix.date }}"
            exit 0
          elif [ "$status" = "FAILED" ]; then
            echo "❌ Rerun failed for ${{ matrix.type }} VPU ${{ matrix.vpu }} Date ${{ matrix.date }}"
            
            # Get failure details
            aws stepfunctions describe-execution \
              --execution-arn "$execution_arn" \
              --region ${{ env.AWS_REGION }} \
              --query 'cause' \
              --output text
            exit 1
          elif [ "$status" = "TIMED_OUT" ]; then
            echo "⏱️ Execution timed out"
            exit 1
          else
            echo "⚠️ Execution did not complete within timeout period"
            exit 1
          fi

      - name: Verify Output Files
        if: success()
        run: |
          # Construct S3 path based on run type
          if [ "${{ matrix.type }}" = "medium_range" ]; then
            s3_path="s3://ciroh-community-ngen-datastream/ngen.${{ matrix.date }}/${{ matrix.type }}/${{ matrix.cycle }}/${{ matrix.ensemble }}/VPU_${{ matrix.vpu }}/"
          else
            # Works for short_range, analysis_assim, analysis_assim_extend
            s3_path="s3://ciroh-community-ngen-datastream/ngen.${{ matrix.date }}/${{ matrix.type }}/${{ matrix.cycle }}/VPU_${{ matrix.vpu }}/"
          fi
          
          echo "Checking output files at: $s3_path"
          
          # Wait a bit for S3 eventual consistency
          sleep 10
          
          file_list=$(aws s3 ls "$s3_path" --recursive 2>/dev/null || echo "")
          
          if [ -n "$file_list" ]; then
            file_count=$(echo "$file_list" | wc -l)
            echo "✅ SUCCESS: Found $file_count output files"
            echo "First 20 files:"
            echo "$file_list" | head -20
          else
            echo "❌ WARNING: No output files found at $s3_path"
            echo "This might be normal if the run just completed. Checking parent directory..."
            
            parent_path="${s3_path%/VPU_*}"
            aws s3 ls "$parent_path" --recursive | head -10 || true
            exit 1
          fi

  rerun-summary:
    name: Rerun Summary
    needs: [health-check, execute-reruns]
    if: always() && needs.health-check.outputs.has_failures == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        run: |
          echo "# NRDS Health Check & Rerun Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Failures Detected:** ${{ needs.health-check.outputs.failure_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          failures='${{ needs.health-check.outputs.failures }}'
          
          echo "## Failures Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Date | Type | Cycle | VPU | Ensemble |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|-------|-----|----------|" >> $GITHUB_STEP_SUMMARY
          
          echo "$failures" | jq -r '.[] | "| \(.date) | \(.type) | \(.cycle) | \(.vpu) | \(.ensemble // "N/A") |"' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Rerun Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.execute-reruns.result }}" = "success" ]; then
            echo "✅ **All reruns completed successfully**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.execute-reruns.result }}" = "failure" ]; then
            echo "❌ **Some reruns failed - check individual job logs for details**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.execute-reruns.result }}" = "skipped" ]; then
            echo "⏭️ **Reruns were skipped (auto_rerun was disabled)**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Reruns were cancelled or encountered an error**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  terraform-destroy:
    name: Terraform Destroy Test Resources
    needs: [execute-reruns, health-check]
    runs-on: ubuntu-latest
    if: always() && needs.health-check.outputs.has_failures == 'true' && needs.health-check.outputs.auto_rerun == 'true'
    defaults:
      run:
        working-directory: infra/aws/terraform

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformDestroy
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install --upgrade pip awscli boto3 pandas

      - name: Generate execution files
        working-directory: infra/aws
        run: |
          echo "Working directory: $(pwd)"
          echo "Generating VPU execution files..."
          python python/src/research_datastream/gen_vpu_execs.py \
            --arch arm \
            --inputs terraform/modules/schedules/config/execution_forecast_inputs.json \
            --ami_file terraform/modules/schedules/config/community_ami.txt \
            --exec_template_vpu terraform/modules/schedules/executions/templates/execution_datastream_VPU_template.json \
            --exec_template_fp terraform/modules/schedules/executions/templates/execution_datastream_fp_template.json \
            --out_dir terraform/modules/schedules/executions
          echo "::notice::Execution files generated successfully"

      - name: Terraform Init
        run: terraform init -backend-config=backend-${ENVIRONMENT}.hcl
        continue-on-error: true

      - name: Verify State Has Resources
        run: |
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l)
          echo "::notice::Found $RESOURCE_COUNT resources in state"
          if [ "$RESOURCE_COUNT" -eq 0 ]; then
            echo "::warning::No resources in state to destroy!"
          else
            terraform state list
          fi
        continue-on-error: true
      
      - name: Stop Rerun Step Functions Executions
        run: |
          echo "Stopping rerun Step Functions executions..."
          
          # Get state machine ARN
          STATE_MACHINE_ARN=$(aws ssm get-parameter \
            --name "/datastream/state-machine-arn" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -n "$STATE_MACHINE_ARN" ]; then
            # Stop all running executions matching rerun pattern
            aws stepfunctions list-executions \
              --state-machine-arn "$STATE_MACHINE_ARN" \
              --status-filter RUNNING \
              --region ${{ env.AWS_REGION }} \
              --query 'executions[*].[executionArn,name]' \
              --output text | while read arn name; do
                if [[ "$name" =~ ^rerun-.* ]]; then
                  echo "Stopping rerun execution: $name"
                  aws stepfunctions stop-execution \
                    --execution-arn "$arn" \
                    --region ${{ env.AWS_REGION }} 2>/dev/null || true
                fi
              done
          else
            echo "No state machine ARN found - skipping execution cleanup"
          fi
        continue-on-error: true
      
      - name: Terminate Rerun EC2 Instances
        run: |
          echo "Terminating rerun EC2 instances..."
          
          # Find all instances with rerun tags
          RERUN_INSTANCES=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=nrds_rerun_*" \
              "Name=instance-state-name,Values=running,pending,stopped,stopping" \
            --query 'Reservations[*].Instances[*].InstanceId' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -n "$RERUN_INSTANCES" ]; then
            echo "Terminating instances: $RERUN_INSTANCES"
            aws ec2 terminate-instances \
              --instance-ids $RERUN_INSTANCES \
              --region ${{ env.AWS_REGION }}
            
            echo "Waiting for instances to terminate..."
            sleep 30
          else
            echo "No rerun instances found"
          fi
        continue-on-error: true
      
      - name: Terraform Destroy - Attempt 1
        id: destroy_attempt1
        run: |
          echo "::notice::Starting Terraform Destroy (Attempt 1)..."
          terraform destroy -var-file=./${{ env.TF_VAR_FILE }} -auto-approve
          echo "::notice::Terraform Destroy completed successfully"
        continue-on-error: true
      
      - name: Terraform Destroy - Attempt 2
        if: steps.destroy_attempt1.outcome == 'failure'
        id: destroy_attempt2
        run: |
          echo "::warning::Retrying destroy after 30s..."
          sleep 30
          terraform destroy -var-file=./${{ env.TF_VAR_FILE }} -auto-approve
        continue-on-error: true
      
      - name: Final State Check
        if: always()
        run: |
          REMAINING=$(terraform state list 2>/dev/null | wc -l)
          if [ "$REMAINING" -gt 0 ]; then
            echo "::warning::$REMAINING resources still in state"
            terraform state list
          else
            echo "::notice::All Terraform resources destroyed"
          fi
        continue-on-error: true
      
      - name: Cleanup Summary
        if: always()
        run: |
          echo "# Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.destroy_attempt1.outcome }}" = "success" ] || [ "${{ steps.destroy_attempt2.outcome }}" = "success" ]; then
            echo "✅ **Terraform resources destroyed successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Terraform destroy encountered issues - manual cleanup may be required**" >> $GITHUB_STEP_SUMMARY
          fi