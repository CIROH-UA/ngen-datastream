name: Orchestration Integration Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/terraform/modules/orchestration/**'
      - 'infra/aws/terraform/services/nrds/iam_*.tf'
  workflow_dispatch:

concurrency:
  group: orchestration-test-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: us-east-1
  TF_DIR: infra/aws/terraform/services/nrds
  CI_CONFIG: .github/orchestration-test
  # Known good date with verified forcing data on S3
  TEST_DATE: "20260209"

jobs:
  integration-test:
    name: Deploy Test SM & Run Execution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: infra/aws/terraform/services/nrds
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # ── Deploy orchestration module only (no schedules) ────────────
      - name: Terraform Init
        run: terraform init -backend-config="${{ github.workspace }}/${{ env.CI_CONFIG }}/ci.backend.hcl"

      - name: Terraform Apply (orchestration only)
        id: deploy
        run: |
          terraform apply \
            -var-file="${{ github.workspace }}/${{ env.CI_CONFIG }}/ci.tfvars" \
            -target=module.nrds_orchestration \
            -auto-approve -input=false -lock-timeout=5m

          echo "sm_arn=$(terraform output -raw datastream_arn)" >> "$GITHUB_OUTPUT"
          echo "profile=$(terraform output -raw ec2_instance_profile_name)" >> "$GITHUB_OUTPUT"

      # ── Build payload from static test template ─────────────────────
      - name: Build execution payload
        working-directory: .
        run: |
          PAYLOAD="${{ github.workspace }}/${{ env.CI_CONFIG }}/test-execution-payload.json"

          # - Swap instance profile placeholder to CI profile
          # - Replace DAILY in forcing/prefix paths with known good date
          #   (prevents Commander lambda from using today's date)
          # - Pin end_date so forcing data is guaranteed to exist
          # - Redirect S3 output to test prefix
          jq \
            --arg PROFILE "${{ steps.deploy.outputs.profile }}" \
            --arg DATE "${{ env.TEST_DATE }}" \
            '
            .instance_parameters.IamInstanceProfile.Name = $PROFILE |
            .commands |= map(gsub("ngen\\.DAILY"; "ngen.\($DATE)")) |
            .commands |= map(gsub("-s DAILY"; "-s DAILY -e \($DATE)0000")) |
            .commands |= map(sub("--S3_PREFIX \\S+"; "--S3_PREFIX test/cicd/orchestration-test'\''"))
            ' "$PAYLOAD" > /tmp/exec_input.json

          echo "Payload built:"
          jq '.commands[0][:200]' /tmp/exec_input.json

      # ── Execute and monitor ────────────────────────────────────────
      - name: Start and monitor execution
        id: monitor
        working-directory: .
        run: |
          EXEC_NAME="ci_test_pr${{ github.event.pull_request.number || 'manual' }}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ steps.deploy.outputs.sm_arn }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/exec_input.json" \
            --query 'executionArn' --output text)
          echo "Started: $EXEC_ARN"

          TIMEOUT=2400
          ELAPSED=0
          STATUS="RUNNING"

          while [ "$STATUS" = "RUNNING" ] && [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" --query 'status' --output text)
            echo "[$ELAPSED s] $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            fi
          done

          # Capture execution history regardless of outcome
          aws stepfunctions get-execution-history \
            --execution-arn "$EXEC_ARN" \
            --query "events[?type=='TaskStateEntered' || type=='TaskSucceeded' || type=='TaskFailed' || type=='LambdaFunctionFailed' || type=='LambdaFunctionScheduleFailed' || type=='ExecutionFailed']" \
            --output json | tee /tmp/history.json

          echo "history<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/history.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "RUNNING" ]; then
            echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=$STATUS" >> "$GITHUB_OUTPUT"
            echo "::error::SM execution $STATUS. See history above."
            exit 1
          fi

      # ── Clean up test output on S3 ────────────────────────────────
      - name: Clean up test S3 output
        if: always()
        run: aws s3 rm "s3://ciroh-community-ngen-datastream/test/cicd/orchestration-test/" --recursive || true

      # ── Always destroy (orchestration only) ────────────────────────
      - name: Terraform Destroy
        if: always() && steps.deploy.outcome == 'success'
        run: |
          terraform destroy \
            -var-file="${{ github.workspace }}/${{ env.CI_CONFIG }}/ci.tfvars" \
            -target=module.nrds_orchestration \
            -auto-approve -input=false -lock-timeout=5m

      - name: Clean up state
        if: always() && steps.deploy.outcome == 'success'
        run: aws s3 rm "s3://ciroh-terraform-state/nrds-ci/" --recursive || true

      # ── Post result to PR ──────────────────────────────────────────
      - name: Post result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = '${{ steps.monitor.outputs.result }}' || 'DID_NOT_RUN';
            const icon = result === 'SUCCEEDED' ? '\u2705' : '\u274C';
            const history = `${{ steps.monitor.outputs.history }}` || '';

            let body = `### Orchestration Integration Test ${icon}\n\n`;
            body += `**Result: ${result}**\n\n`;
            if (history) {
              body += `<details><summary>Lambda Execution History</summary>\n\n`;
              body += '```\n' + history + '\n```\n\n</details>\n\n';
            }
            body += `*Triggered by PR #${{ github.event.pull_request.number }}*`;

            const marker = 'Orchestration Integration Test';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
