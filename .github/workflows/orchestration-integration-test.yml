name: Orchestration Integration Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/aws/terraform/modules/orchestration/**'
      - 'infra/aws/terraform/services/nrds/iam_*.tf'
  workflow_dispatch:

concurrency:
  group: orchestration-test-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: us-east-1
  WORKING_DIR: infra/aws/terraform/services/nrds

jobs:
  integration-test:
    name: Deploy Test SM & Run Execution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # ── Deploy test orchestration ──────────────────────────────────
      - name: Terraform Init (test backend)
        run: terraform init -backend-config="envs/ci.backend.hcl"

      - name: Terraform Apply (orchestration only)
        id: deploy
        run: |
          terraform apply \
            -var-file="envs/ci.tfvars" \
            -target=module.nrds_orchestration \
            -auto-approve -input=false -lock-timeout=5m

          SM_ARN=$(terraform output -raw datastream_arn)
          PROFILE=$(terraform output -raw ec2_instance_profile_name)
          echo "sm_arn=$SM_ARN" >> "$GITHUB_OUTPUT"
          echo "instance_profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Deployed test SM: $SM_ARN"

      # ── Build execution payload from recent prod run ───────────────
      - name: Build test payload
        id: payload
        run: |
          PROD_SM="arn:aws:states:us-east-1:879381264451:stateMachine:nrds_prod_sm"

          # Grab the most recent successful short_range execution
          EXEC_ARN=$(aws stepfunctions list-executions \
            --state-machine-arn "$PROD_SM" \
            --status-filter SUCCEEDED \
            --max-results 20 \
            --query "executions[?contains(name,'short_range')].executionArn | [0]" \
            --output text)

          if [ "$EXEC_ARN" = "None" ] || [ -z "$EXEC_ARN" ]; then
            echo "No recent successful execution found"
            exit 1
          fi
          echo "Using payload from: $EXEC_ARN"

          # Extract input and swap instance profile to test
          aws stepfunctions describe-execution \
            --execution-arn "$EXEC_ARN" \
            --query 'input' --output text > /tmp/raw_input.json

          python3 -c "
          import json, sys
          d = json.load(open('/tmp/raw_input.json'))
          d['instance_parameters']['IamInstanceProfile']['Name'] = '${{ steps.deploy.outputs.instance_profile }}'
          for ts in d['instance_parameters'].get('TagSpecifications', []):
              for tag in ts.get('Tags', []):
                  if tag['Key'] == 'Name':
                      tag['Value'] = 'ci_orchestration_test'
                  if tag['Key'] == 'Project':
                      tag['Value'] = 'ci_orchestration_test'
          json.dump(d, open('/tmp/exec_input.json', 'w'))
          "
          echo "Payload ready"

      # ── Execute and monitor ────────────────────────────────────────
      - name: Start execution
        id: execute
        run: |
          EXEC_NAME="ci_test_pr${{ github.event.pull_request.number }}_$(date +%s)"
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ steps.deploy.outputs.sm_arn }}" \
            --name "$EXEC_NAME" \
            --input "file:///tmp/exec_input.json" \
            --query 'executionArn' --output text)

          echo "exec_arn=$EXEC_ARN" >> "$GITHUB_OUTPUT"
          echo "Started: $EXEC_ARN"

      - name: Monitor execution
        id: monitor
        run: |
          EXEC_ARN="${{ steps.execute.outputs.exec_arn }}"
          TIMEOUT=2400  # 40 minutes
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" \
              --query 'status' --output text)

            echo "[$ELAPSED s] Status: $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "result=SUCCEEDED" >> "$GITHUB_OUTPUT"

              # Collect lambda timings
              HISTORY=$(aws stepfunctions get-execution-history \
                --execution-arn "$EXEC_ARN" \
                --query "events[?type=='TaskStateEntered' || type=='TaskSucceeded' || type=='TaskFailed'].[type,timestamp,stateEnteredEventDetails.name]" \
                --output text)
              echo "Lambda history:"
              echo "$HISTORY"
              echo "history<<HIST_EOF" >> "$GITHUB_OUTPUT"
              echo "$HISTORY" >> "$GITHUB_OUTPUT"
              echo "HIST_EOF" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "ABORTED" ]; then
              echo "result=$STATUS" >> "$GITHUB_OUTPUT"
              CAUSE=$(aws stepfunctions describe-execution \
                --execution-arn "$EXEC_ARN" \
                --query 'cause' --output text 2>/dev/null || echo "Unknown")
              echo "error=$CAUSE" >> "$GITHUB_OUTPUT"
              echo "Execution $STATUS: $CAUSE"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "result=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "Timed out after ${TIMEOUT}s"
          exit 1

      # ── Always destroy ─────────────────────────────────────────────
      - name: Terraform Destroy (cleanup)
        if: always() && steps.deploy.outcome == 'success'
        run: |
          terraform destroy \
            -var-file="envs/ci.tfvars" \
            -auto-approve -input=false -lock-timeout=5m
          echo "Test environment destroyed"

      - name: Clean up CI state
        if: always() && steps.deploy.outcome == 'success'
        run: |
          aws s3 rm "s3://ciroh-terraform-state/nrds-ci/" --recursive || true

      # ── Post result to PR ──────────────────────────────────────────
      - name: Post result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = '${{ steps.monitor.outputs.result }}' || 'DID_NOT_RUN';
            const icon = result === 'SUCCEEDED' ? '\u2705' : '\u274C';
            const error = '${{ steps.monitor.outputs.error }}' || '';
            const history = `${{ steps.monitor.outputs.history }}` || '';

            let body = `### Orchestration Integration Test ${icon}\n\n`;
            body += `**Result: ${result}**\n\n`;

            if (history) {
              body += `<details><summary>Lambda Execution History</summary>\n\n`;
              body += '```\n' + history + '\n```\n\n</details>\n\n';
            }
            if (error) {
              body += `**Error:** ${error}\n\n`;
            }

            body += `*Triggered by PR #${{ github.event.pull_request.number }}*`;

            const marker = 'Orchestration Integration Test';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
