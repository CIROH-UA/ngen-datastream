          # Modify execution file with correct date and S3 prefix
          # Get number of cores for the VPU
          if [ "$vpu" = "10L" ] || [ "$vpu" = "10U" ]; then
            nprocs="8"
          elif [ "$vpu" = "05" ] || [ "$vpu" = "07" ] || [ "$vpu" = "11" ] || [ "$vpu" = "17" ]; then
            nprocs="8"
          else
            nprocs="4"
          fi
          
          # Set forecast range based on type
          if [ "$type" = "short_range" ]; then
            fcst="f001_f018"
            run_type_h="SHORT_RANGE"
          elif [ "$type" = "medium_range" ]; then
            fcst="f001_f240"
            run_type_h="MEDIUM_RANGE"
          else
            fcst="tm27_tm00"
            run_type_h="ANALYSIS_ASSIM_EXTEND"
          fi
          
          jq --arg DATE "$date" \
             --arg VPU "$vpu" \
             --arg TYPE "$type" \
             --arg CYCLE "$cycle" \
             --arg ENSEMBLE "$ensemble" \
             --arg NPROCS "$nprocs" \
             --arg FCST "$fcst" \
             --arg RUN_TYPE_H "$run_type_h" \
             --arg RUN_TYPE_L "$type" '
            .instance_parameters.TagSpecifications = [{
              "ResourceType": "instance",
              "Tags": [
                {"Key": "Project", "Value": "nrds_rerun_\($VPU)_\($DATE)"},
                {"Key": "RerunDate", "Value": $DATE},
                {"Key": "OriginalFailure", "Value": "true"}
              ]
            }] |
            .commands |= map(
              gsub("\\$VPU"; $VPU)
              | gsub("\\$NPROCS"; $NPROCS)
              | gsub("\\$RUN_TYPE_L"; $RUN_TYPE_L)
              | gsub("\\$RUN_TYPE_H"; $RUN_TYPE_H)
              | gsub("\\$INIT"; $CYCLE)
              | gsub("\\$FCST"; $FCST)
              | gsub("\\$MEMBER"; if $ENSEMBLE == "0" then "" else $ENSEMBLE end)
              | gsub("ngen.DAILY"; "ngen.\($DATE)")
              | gsub("-s DAILY"; "-s \($DATE)0100 -e \($DATE)0000")
            )
          ' "$source_file" > "$output_file"
